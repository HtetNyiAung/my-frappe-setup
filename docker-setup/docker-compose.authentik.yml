services:
  # --- 1. Init container to fix host permissions ---
  authentik-init:
    image: alpine
    container_name: authentik-init
    user: root
    volumes:
      - .:/setup
    command: >
      sh -c "mkdir -p /setup/authentik_media /setup/authentik_certs /setup/authentik_custom_templates && 
             chmod -R 777 /setup/authentik_media /setup/authentik_certs /setup/authentik_custom_templates"
    restart: "no" # Runs once and exits

  # --- 2. Database ---
  authentik-db:
    image: postgres:16-alpine
    container_name: authentik-db
    environment:
      POSTGRES_DB: ${AUTHENTIK_DB_NAME:-authentik}
      POSTGRES_USER: ${AUTHENTIK_DB_USER:-authentik}
      POSTGRES_PASSWORD: ${AUTHENTIK_DB_PASSWORD:-authentik_password}
    volumes:
      - authentik_db_data:/var/lib/postgresql/data
    networks:
      - authentik-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${AUTHENTIK_DB_USER:-authentik}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  authentik-redis:
    image: redis:alpine
    container_name: authentik-redis
    command: --save 60 1 --loglevel warning
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping | grep PONG" ]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    volumes:
      - authentik_redis_data:/data
    networks:
      - authentik-network

  authentik-server:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2024.12.3}
    container_name: authentik-server
    command: server
    environment:
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-db
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_DB_NAME:-authentik}
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_DB_USER:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD:-authentik_password}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?secret key required}
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD:-admin}
      AUTHENTIK_BOOTSTRAP_EMAIL: ${AUTHENTIK_BOOTSTRAP_EMAIL:-admin@example.com}
      # Email settings (optional, but recommended)
      # AUTHENTIK_EMAIL__HOST: ${AUTHENTIK_EMAIL_HOST}
      # AUTHENTIK_EMAIL__PORT: ${AUTHENTIK_EMAIL_PORT}
      # AUTHENTIK_EMAIL__USERNAME: ${AUTHENTIK_EMAIL_USERNAME}
      # AUTHENTIK_EMAIL__PASSWORD: ${AUTHENTIK_EMAIL_PASSWORD}
      # AUTHENTIK_EMAIL__USE_TLS: "true"
      # AUTHENTIK_EMAIL__FROM: ${AUTHENTIK_EMAIL_FROM}
    volumes:
      - ./authentik_media:/media
      - ./authentik_custom_templates:/templates
    ports:
      - "${AUTHENTIK_PORT:-9000}:9000"
      - "${AUTHENTIK_HTTPS_PORT:-9443}:9443"
    depends_on:
      authentik-db:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
      authentik-init:
        condition: service_completed_successfully
    networks:
      - authentik-network
      - frappe_network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  authentik-worker:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2024.12.3}
    container_name: authentik-worker
    command: worker
    user: root
    environment:
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-db
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_DB_NAME:-authentik}
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_DB_USER:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD:-authentik_password}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?secret key required}
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD:-admin}
      AUTHENTIK_BOOTSTRAP_EMAIL: ${AUTHENTIK_BOOTSTRAP_EMAIL:-admin@example.com}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./authentik_media:/media
      - ./authentik_certs:/certs
      - ./authentik_custom_templates:/templates
    depends_on:
      authentik-db:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
      authentik-init:
        condition: service_completed_successfully
    networks:
      - authentik-network
      - frappe_network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  authentik-network:
    driver: bridge
    name: authentik-network
  frappe_network:
    external: true
    name: docker-setup_frappe_network

volumes:
  authentik_db_data:
    name: authentik_db_data
  authentik_redis_data:
    name: authentik_redis_data
