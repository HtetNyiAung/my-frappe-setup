# Custom pwd.yml - Frappe LMS
# Override: Use custom-built image and install all apps during site creation

x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: ${LOG_MAX_SIZE:-50m}
    max-file: "${LOG_MAX_FILE:-5}"

services:
  backend:
    image: ${CUSTOM_IMAGE}
    logging: *default-logging
    restart: unless-stopped
    networks:
      - frappe_network
    depends_on:
      configurator:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('127.0.0.1', 8000), 5); s.close()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    stop_grace_period: 1m
    deploy:
      restart_policy:
        condition: on-failure
      resources:
        reservations:
          memory: 512m
        limits:
          memory: 2g
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}

  configurator:
    image: ${CUSTOM_IMAGE}
    logging: *default-logging
    networks:
      - frappe_network
    working_dir: /home/frappe/frappe-bench
    deploy:
      restart_policy:
        condition: none
    entrypoint:
      - bash
      - -c
    command:
      - >
        find apps -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort > sites/apps.txt;
        echo "Installed apps:"; cat sites/apps.txt;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port $$SOCKETIO_PORT;
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      SOCKETIO_PORT: "9000"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

  create-site:
    image: ${CUSTOM_IMAGE}
    logging: *default-logging
    networks:
      - frappe_network
    working_dir: /home/frappe/frappe-bench
    depends_on:
      configurator:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
    deploy:
      restart_policy:
        condition: none
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    entrypoint:
      - bash
      - -c
    command:
      - >
        wait-for-it -t 120 db:3306;
        wait-for-it -t 120 redis-cache:6379;
        wait-for-it -t 120 redis-queue:6379;
        start=$$(date +%s);
        until [ -f sites/common_site_config.json ] && [ -n "$$(jq -r '.db_host // empty' sites/common_site_config.json 2>/dev/null)" ] && [ -n "$$(jq -r '.redis_cache // empty' sites/common_site_config.json 2>/dev/null)" ]; do
          echo "Waiting for sites/common_site_config.json to be created";
          sleep 5;
          elapsed=$$(($$(date +%s)-start));
          if [ $$elapsed -gt 120 ]; then
            echo "could not find sites/common_site_config.json with required keys";
            exit 1;
          fi;
        done;
        echo "sites/common_site_config.json found";
        # Site creation is handled by setup.sh to allow for better error handling and app installation
        echo "Ready for site creation";

  db:
    image: mariadb:10.6
    logging: *default-logging
    restart: unless-stopped
    networks:
      - frappe_network
    healthcheck:
      test: mysqladmin ping -h localhost --password=$$MARIADB_ROOT_PASSWORD
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    stop_grace_period: 2m
    deploy:
      restart_policy:
        condition: on-failure
      resources:
        reservations:
          memory: 512m
        limits:
          memory: 2g
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "3307:3306"

  frontend:
    image: ${CUSTOM_IMAGE}
    logging: *default-logging
    restart: unless-stopped
    networks:
      - frappe_network
    depends_on:
      backend:
        condition: service_healthy
      websocket:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('127.0.0.1', 8080), 5); s.close()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    stop_grace_period: 1m
    deploy:
      restart_policy:
        condition: on-failure
      resources:
        reservations:
          memory: 256m
        limits:
          memory: 1g
    command:
      - nginx-entrypoint.sh
    environment:
      BACKEND: backend:8000
      FRAPPE_SITE_NAME_HEADER: ${SITE_DOMAIN}
      SOCKETIO: websocket:9000
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: 120
      CLIENT_MAX_BODY_SIZE: 50m
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - ./frappe.conf.template:/templates/nginx/frappe.conf.template
    ports:
      - "${BIND_ADDRESS}:${FRAPPE_PORT}:${FRAPPE_INTERNAL_PORT}"

  queue-long:
    image: ${CUSTOM_IMAGE}
    logging: *default-logging
    restart: unless-stopped
    networks:
      - frappe_network
    depends_on:
      configurator:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
    stop_grace_period: 1m
    deploy:
      restart_policy:
        condition: on-failure
      resources:
        reservations:
          memory: 512m
        limits:
          memory: 2g
    command:
      - bench
      - worker
      - --queue
      - long,default,short
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    environment:
      FRAPPE_REDIS_CACHE: redis://redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://redis-queue:6379

  queue-short:
    image: ${CUSTOM_IMAGE}
    logging: *default-logging
    restart: unless-stopped
    networks:
      - frappe_network
    depends_on:
      configurator:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
    stop_grace_period: 1m
    deploy:
      restart_policy:
        condition: on-failure
      resources:
        reservations:
          memory: 256m
        limits:
          memory: 1g
    command:
      - bench
      - worker
      - --queue
      - short,default
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    environment:
      FRAPPE_REDIS_CACHE: redis://redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://redis-queue:6379

  redis-queue:
    image: redis:6.2-alpine
    logging: *default-logging
    restart: unless-stopped
    networks:
      - frappe_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      restart_policy:
        condition: on-failure
      resources:
        reservations:
          memory: 128m
        limits:
          memory: 512m
    volumes:
      - redis-queue-data:/data

  redis-cache:
    image: redis:6.2-alpine
    logging: *default-logging
    restart: unless-stopped
    networks:
      - frappe_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      restart_policy:
        condition: on-failure
      resources:
        reservations:
          memory: 128m
        limits:
          memory: 512m

  scheduler:
    image: ${CUSTOM_IMAGE}
    logging: *default-logging
    restart: unless-stopped
    networks:
      - frappe_network
    depends_on:
      configurator:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
    stop_grace_period: 1m
    deploy:
      restart_policy:
        condition: on-failure
      resources:
        reservations:
          memory: 256m
        limits:
          memory: 1g
    command:
      - bench
      - schedule
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

  websocket:
    image: ${CUSTOM_IMAGE}
    logging: *default-logging
    restart: unless-stopped
    networks:
      - frappe_network
    depends_on:
      configurator:
        condition: service_completed_successfully
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('127.0.0.1', 9000), 5); s.close()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    stop_grace_period: 1m
    deploy:
      restart_policy:
        condition: on-failure
      resources:
        reservations:
          memory: 256m
        limits:
          memory: 1g
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    environment:
      FRAPPE_REDIS_CACHE: redis://redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://redis-queue:6379
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

volumes:
  db-data:
  redis-queue-data:
  sites:
  logs:

networks:
  frappe_network:
    driver: bridge
